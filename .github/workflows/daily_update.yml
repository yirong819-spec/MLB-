name: Daily MLB Forecast Update
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
on:
  workflow_dispatch:
jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      - run: pip install requests
      - name: Run script
        env: {MLB_API_KEY: ${{ secrets.MLB_API_KEY }}}
        run: python fetch_and_run.py
      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add latest_forecast.json
          git commit -m "Auto Update Forecast" || echo "No changes"
          git push
