name: Daily MLB Forecast Update
on:
  schedule:
    - cron: '0 22 * * *' # 每天台灣時間清晨 06:00 自動執行
  workflow_dispatch: # 允許手動點擊執行
jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt
    - run: python fetch_and_run.py
    - name: Commit data
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add latest_forecast.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update data" && git push)
